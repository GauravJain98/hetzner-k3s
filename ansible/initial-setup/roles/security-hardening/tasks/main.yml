---
# --- SSH Hardening ---
- name: Deploy hardened sshd_config
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0600"
    validate: "sshd -t -f %s"

# --- Firewall (UFW) ---
- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true

- name: Allow required ports through UFW
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
  loop:
    - { port: "22", proto: tcp }      # SSH
    - { port: "80", proto: tcp }      # HTTP
    - { port: "443", proto: tcp }     # HTTPS
    - { port: "6443", proto: tcp }    # K3S API server
    - { port: "10250", proto: tcp }   # kubelet metrics
    - { port: "2379:2380", proto: tcp }  # etcd
    - { port: "8472", proto: udp }    # Flannel VXLAN
    - { port: "51820", proto: udp }   # WireGuard (IPv4)
    - { port: "51821", proto: udp }   # WireGuard (IPv6)

- name: Set UFW default deny incoming
  community.general.ufw:
    state: enabled
    default: deny
    direction: incoming

- name: Set UFW default allow outgoing
  community.general.ufw:
    default: allow
    direction: outgoing

# --- Unattended Upgrades ---
- name: Install unattended-upgrades
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present

- name: Enable unattended-upgrades
  ansible.builtin.command:
    cmd: dpkg-reconfigure -plow unattended-upgrades -fnoninteractive
  changed_when: false

# --- Restart SSH (last step) ---
# This kills the current root SSH session, so it must run last.
# async/poll avoids play failure when the SSH connection drops.
- name: Restart sshd to apply hardened config
  ansible.builtin.systemd:
    name: sshd
    state: restarted
  async: 1
  poll: 0

- name: Confirm SSH hardening applied
  ansible.builtin.debug:
    msg: >-
      SSH has been restarted with the hardened config.
      The connection drop above (if any) is expected — root login is now disabled.
      Reconnect using: ssh {{ admin_user }}@{{ ansible_host }}
