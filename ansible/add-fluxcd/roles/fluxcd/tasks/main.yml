---
- name: Install Helm
  ansible.builtin.shell: |
    curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm
  tags: fluxcd

- name: Add FluxCD Helm repo
  ansible.builtin.command:
    cmd: helm repo add fluxcd https://fluxcd-community.github.io/helm-charts
  register: helm_repo_add
  changed_when: "'has been added' in helm_repo_add.stdout"
  failed_when: "helm_repo_add.rc != 0 and 'already exists' not in helm_repo_add.stderr"
  tags: fluxcd

- name: Update Helm repos
  ansible.builtin.command:
    cmd: helm repo update
  changed_when: false
  tags: fluxcd

- name: Create flux-system namespace
  ansible.builtin.command:
    cmd: kubectl create namespace {{ flux_namespace }} --kubeconfig=/etc/rancher/k3s/k3s.yaml
  register: ns_create
  changed_when: ns_create.rc == 0
  failed_when: "ns_create.rc != 0 and 'already exists' not in ns_create.stderr"
  tags: fluxcd

- name: Install/upgrade FluxCD via Helm
  ansible.builtin.command:
    cmd: >
      helm upgrade --install flux-operator fluxcd/flux-operator
      --namespace={{ flux_namespace }}
      --kubeconfig=/etc/rancher/k3s/k3s.yaml
  register: helm_install
  changed_when: "'STATUS: deployed' in helm_install.stdout"
  tags: fluxcd

- name: Wait for FluxCD controllers to be ready
  ansible.builtin.command:
    cmd: >
      kubectl wait --for=condition=ready pod
      --all
      --namespace={{ flux_namespace }}
      --timeout=120s
      --kubeconfig=/etc/rancher/k3s/k3s.yaml
  register: flux_wait
  changed_when: false
  retries: 5
  delay: 10
  until: flux_wait.rc == 0
  tags: fluxcd

- name: Print FluxCD status
  ansible.builtin.command:
    cmd: kwbectl get pods -n {{ flux_namespace }} --kubeconfig=/etc/rancher/k3s/k3s.yaml
  register: flux_status
  changed_when: false
  tags: fluxcd

- name: Display FluxCD pod status
  ansible.builtin.debug:
    msg: "{{ flux_status.stdout }}"
  tags: fluxcd
