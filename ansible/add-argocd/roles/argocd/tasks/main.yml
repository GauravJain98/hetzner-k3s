---
- name: Install Helm binary
  ansible.builtin.shell: |
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm
  tags: argocd

- name: Create argocd namespace
  ansible.builtin.command:
    cmd: k3s kubectl create namespace {{ argocd_namespace }}
  register: ns_result
  changed_when: ns_result.rc == 0
  failed_when: ns_result.rc != 0 and 'already exists' not in ns_result.stderr
  tags: argocd

- name: Deploy ArgoCD Helm chart
  kubernetes.core.helm:
    name: "{{ argocd_release_name }}"
    chart_ref: "{{ argocd_chart_name }}"
    chart_repo_url: "{{ argocd_chart_repo }}"
    chart_version: "{{ argocd_chart_version }}"
    release_namespace: "{{ argocd_namespace }}"
    create_namespace: false
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    values: "{{ argocd_helm_values }}"
    wait: true
    wait_timeout: "300s"
  tags: argocd

- name: Wait for argocd-server rollout
  ansible.builtin.command:
    cmd: k3s kubectl rollout status deployment/{{ argocd_release_name }}-server -n {{ argocd_namespace }} --timeout=120s
  changed_when: false
  tags: argocd

- name: Template self-managed Application CR
  ansible.builtin.template:
    src: argocd-self-managed-app.yml.j2
    dest: /tmp/argocd-self-managed-app.yml
    mode: "0600"
  tags: argocd

- name: Apply self-managed Application CR
  ansible.builtin.command:
    cmd: k3s kubectl apply -f /tmp/argocd-self-managed-app.yml
  register: apply_result
  changed_when: "'configured' in apply_result.stdout or 'created' in apply_result.stdout"
  tags: argocd

- name: Clean up temp manifest
  ansible.builtin.file:
    path: /tmp/argocd-self-managed-app.yml
    state: absent
  tags: argocd

- name: Get initial admin password
  ansible.builtin.command:
    cmd: k3s kubectl get secret argocd-initial-admin-secret -n {{ argocd_namespace }} -o jsonpath='{.data.password}'
  register: argocd_admin_password_b64
  changed_when: false
  failed_when: false
  tags: argocd

- name: Print initial admin password
  ansible.builtin.debug:
    msg: "ArgoCD initial admin password: {{ argocd_admin_password_b64.stdout | b64decode }}"
  when: argocd_admin_password_b64.rc == 0
  tags: argocd
